<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Create Account — FlavorFind</title><link rel="stylesheet" href="style.css">
<style>
.auth-page { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
.auth-panel { display:flex; flex-direction:column; justify-content:center; align-items:center; padding:3rem 2.5rem; background:var(--parchment); }
.auth-visual { position:relative; overflow:hidden; }
.auth-visual img { width:100%; height:100%; object-fit:cover; }
.auth-visual-overlay { position:absolute; inset:0; background:linear-gradient(160deg,rgba(44,24,16,0.65),rgba(58,92,56,0.5)); display:flex; flex-direction:column; justify-content:flex-end; padding:3rem; }
@media(max-width:768px){ .auth-page{grid-template-columns:1fr} .auth-visual{display:none} }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=700&q=80" alt="">
    <div class="auth-visual-overlay">
      <div style="font-family:var(--font-script);font-size:2rem;color:white;margin-bottom:0.75rem;">🌿 FlavorFind</div>
      <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;gap:0.6rem;color:rgba(255,255,255,0.8);font-size:0.88rem;"><span style="color:var(--sage-light);">✓</span> Save unlimited favourite recipes</div>
        <div style="display:flex;align-items:center;gap:0.6rem;color:rgba(255,255,255,0.8);font-size:0.88rem;"><span style="color:var(--sage-light);">✓</span> Build beautiful recipe collections</div>
        <div style="display:flex;align-items:center;gap:0.6rem;color:rgba(255,255,255,0.8);font-size:0.88rem;"><span style="color:var(--sage-light);">✓</span> Publish and share your own recipes</div>
        <div style="display:flex;align-items:center;gap:0.6rem;color:rgba(255,255,255,0.8);font-size:0.88rem;"><span style="color:var(--sage-light);">✓</span> Follow chefs from around the world</div>
      </div>
      <div style="display:flex;gap:2rem;">
        <div><div style="font-family:var(--font-display);font-size:1.5rem;color:var(--terra-light);font-weight:700;">50K+</div><div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;">Members</div></div>
        <div><div style="font-family:var(--font-display);font-size:1.5rem;color:var(--terra-light);font-weight:700;">2,400+</div><div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em;">Recipes</div></div>
      </div>
    </div>
  </div>

  <div class="auth-panel">
    <div style="width:100%;max-width:400px;" class="anim-fadeup">
      <a href="home.html" style="display:flex;align-items:center;gap:8px;margin-bottom:2.5rem;">
        <div class="nav-logo-leaf" style="width:30px;height:30px;font-size:15px;">🌿</div>
        <span style="font-family:var(--font-script);font-size:1.5rem;color:var(--terracotta);">FlavorFind</span>
      </a>
      <div style="margin-bottom:2rem;"><h1 style="font-family:var(--font-display);font-size:2rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.25rem;">Create account</h1><p style="color:var(--dust);font-size:0.9rem;">Free forever — no credit card needed.</p></div>
      <div class="form-group"><label class="form-label">Username *</label><input class="form-input" id="u" placeholder="yourname" autofocus></div>
      <div class="form-group"><label class="form-label">Email *</label><input class="form-input" type="email" id="e" placeholder="you@example.com"></div>
      <div class="form-group"><label class="form-label">Password *</label><input class="form-input" type="password" id="p" placeholder="Minimum 6 characters"></div>
      <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" type="password" id="c" placeholder="Repeat password"></div>
      <div id="err" style="color:#C04040;font-size:0.82rem;margin-bottom:0.75rem;display:none;"></div>
      <button class="btn btn-terra btn-full" onclick="go()" style="margin-bottom:1.25rem;">🌿 Create Account</button>
      <p style="text-align:center;font-size:0.83rem;color:var(--dust);">Have an account? <a href="login.html" style="color:var(--terracotta);font-weight:600;">Sign in</a></p>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="app.js"></script>
<script>
  function go(){
    const u=document.getElementById('u').value.trim(),e=document.getElementById('e').value.trim(),p=document.getElementById('p').value,c=document.getElementById('c').value,err=document.getElementById('err');
    if(!u||!e||!p){err.textContent='Please fill all required fields.';err.style.display='block';return;}
    if(p!==c){err.textContent='Passwords do not match.';err.style.display='block';return;}
    if(p.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
    err.style.display='none'; toast('Account created! Welcome to FlavorFind 🌿','success'); setTimeout(()=>location.href='home.html',1200);
  }
</script>
</body>
</html>
